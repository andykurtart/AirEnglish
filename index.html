<title>Travel Guide</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f7;--bg-card:#fff;--bg-nav:rgba(245,245,247,0.88);
  --text-primary:#1d1d1f;--text-secondary:#6e6e73;--text-tertiary:#aeaeb2;
  --border:rgba(0,0,0,0.08);--shadow:0 2px 16px rgba(0,0,0,0.07);
  --accent:#0071e3;--accent-light:rgba(0,113,227,0.1);
  --pill-bg:rgba(0,0,0,0.06);--pill-active:#0071e3;
  --divider:rgba(0,0,0,0.06);--star-off:#d1d1d6;--star-on:#ff9f0a;
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
  --radius:16px;--radius-sm:10px;--nav-height:56px;
}
[data-theme="dark"]{
  --bg:#000;--bg-card:#1c1c1e;--bg-nav:rgba(28,28,30,0.92);
  --text-primary:#f5f5f7;--text-secondary:#98989d;--text-tertiary:#48484a;
  --border:rgba(255,255,255,0.08);--shadow:0 2px 16px rgba(0,0,0,0.4);
  --accent:#2997ff;--accent-light:rgba(41,151,255,0.12);
  --pill-bg:rgba(255,255,255,0.08);--divider:rgba(255,255,255,0.07);
  --star-off:#3a3a3c;
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text-primary);
  min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;
  transition:background .3s,color .3s}
::-webkit-scrollbar{width:0}

/* ── Topbar ── */
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;
  height:calc(var(--nav-height) + var(--safe-top));padding-top:var(--safe-top);
  background:var(--bg-nav);backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding-left:20px;padding-right:16px}
.topbar-logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:28px;height:28px;background:var(--accent);border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.topbar-title{font-size:17px;font-weight:600;letter-spacing:-.3px;color:var(--text-primary)}
.theme-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--pill-bg);
  color:var(--text-primary);cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:16px;transition:background .2s,transform .15s;flex-shrink:0}
.theme-btn:active{transform:scale(.9)}

/* ── Layout ── */
.main{padding-top:calc(var(--nav-height) + var(--safe-top));
  padding-bottom:calc(58px + var(--safe-bottom) + 12px);min-height:100dvh}
.page{display:none;animation:pagein .28s ease}
.page.active{display:block}
@keyframes pagein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── Bottom Nav ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--bg-nav);backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:1px solid var(--border);padding-bottom:var(--safe-bottom);display:flex}
.nav-btn{flex:1;border:none;background:none;cursor:pointer;padding:8px 4px 10px;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--text-tertiary);transition:color .2s;-webkit-tap-highlight-color:transparent}
.nav-btn.active{color:var(--accent)}
.nav-icon{font-size:22px;line-height:1;transition:transform .2s}
.nav-btn:active .nav-icon{transform:scale(.85)}
.nav-label{font-size:10px;font-weight:500;letter-spacing:.2px}

/* ── Section header ── */
.section-header{padding:28px 20px 8px}
.section-title{font-size:28px;font-weight:700;letter-spacing:-.5px;line-height:1.2;color:var(--text-primary)}
.section-sub{font-size:15px;color:var(--text-secondary);margin-top:4px}

/* ── Search ── */
.search-wrap{padding:8px 20px 10px}
.search-box{display:flex;align-items:center;background:var(--pill-bg);
  border-radius:var(--radius-sm);padding:0 12px;gap:8px}
.search-icon{font-size:15px;color:var(--text-tertiary);flex-shrink:0}
.search-input{flex:1;border:none;background:none;padding:10px 0;
  font-family:var(--font);font-size:16px;color:var(--text-primary);outline:none}
.search-input::placeholder{color:var(--text-tertiary)}
.search-clear{border:none;background:none;cursor:pointer;color:var(--text-tertiary);
  font-size:16px;padding:4px;display:none}

/* ── Category pills — WRAP instead of scroll ── */
.cat-pills-wrap{
  display:flex;
  flex-wrap:wrap;       /* ← ключевое изменение */
  gap:8px;
  padding:0 20px 14px;
}
.cat-pill{border:none;background:var(--pill-bg);color:var(--text-secondary);
  border-radius:20px;padding:6px 14px;font-family:var(--font);font-size:14px;
  font-weight:500;cursor:pointer;white-space:nowrap;
  transition:background .2s,color .2s,transform .15s;-webkit-tap-highlight-color:transparent}
.cat-pill.active{background:var(--pill-active);color:#fff}
.cat-pill:active{transform:scale(.95)}

/* ── Phrases ── */
.phrases-wrap{padding:0 20px}
.phrase-group-title{font-size:12px;font-weight:600;text-transform:uppercase;
  letter-spacing:.6px;color:var(--text-tertiary);padding:16px 0 8px}
.phrase-card{background:var(--bg-card);border-radius:var(--radius-sm);
  padding:13px 48px 13px 16px;margin-bottom:8px;border:1px solid var(--border);
  cursor:pointer;transition:transform .15s,background .15s;
  -webkit-tap-highlight-color:transparent;position:relative}
.phrase-card:active{transform:scale(.99);background:var(--pill-bg)}
.phrase-en{font-size:15px;font-weight:500;color:var(--text-primary);
  letter-spacing:-.1px;line-height:1.4}
.phrase-ru{font-size:13px;color:var(--text-secondary);margin-top:3px;line-height:1.4}

/* ── Star button ── */
.star-btn{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  border:none;background:none;cursor:pointer;padding:8px;
  -webkit-tap-highlight-color:transparent;
  font-size:20px;line-height:1;
  color:var(--star-off);
  transition:color .2s,transform .15s;
}
.star-btn.active{color:var(--star-on)}
.star-btn:active{transform:translateY(-50%) scale(1.35)}

/* ── Toast ── */
.copy-toast{position:fixed;bottom:calc(68px + var(--safe-bottom));left:50%;
  transform:translateX(-50%) translateY(16px);background:var(--text-primary);
  color:var(--bg);font-size:13px;font-weight:500;padding:8px 18px;border-radius:20px;
  opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:999;white-space:nowrap}
.copy-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Back btn ── */
.back-header{display:flex;align-items:center;padding:12px 20px 4px}
.back-btn{display:flex;align-items:center;gap:2px;border:none;background:none;
  color:var(--accent);font-family:var(--font);font-size:16px;cursor:pointer;
  padding:4px 0;-webkit-tap-highlight-color:transparent}

/* ── Guides list ── */
.guides-grid{padding:0 20px 16px;display:flex;flex-direction:column;gap:10px}
.guide-card{background:var(--bg-card);border-radius:var(--radius);padding:18px 16px;
  cursor:pointer;border:1px solid var(--border);box-shadow:var(--shadow);
  transition:transform .2s,box-shadow .2s;-webkit-tap-highlight-color:transparent;
  display:flex;align-items:center;gap:14px}
.guide-card:active{transform:scale(.98);box-shadow:none}
.guide-card-icon{width:50px;height:50px;border-radius:14px;display:flex;
  align-items:center;justify-content:center;font-size:23px;flex-shrink:0}
.guide-card-body{flex:1;min-width:0}
.guide-card-title{font-size:15px;font-weight:600;letter-spacing:-.2px;color:var(--text-primary)}
.guide-card-sub{font-size:12px;color:var(--text-secondary);margin-top:2px}
.guide-card-count{font-size:11px;color:var(--text-tertiary);margin-top:3px}
.guide-chevron{color:var(--text-tertiary);font-size:20px;flex-shrink:0}

/* ── Guide detail ── */
.guide-hero{padding:16px 20px 20px}
.guide-hero-icon{width:60px;height:60px;border-radius:17px;display:flex;
  align-items:center;justify-content:center;font-size:28px;margin-bottom:12px}
.guide-hero-title{font-size:26px;font-weight:700;letter-spacing:-.5px;color:var(--text-primary)}
.guide-hero-sub{font-size:15px;color:var(--text-secondary);margin-top:4px}
.tag{display:inline-block;font-size:11px;font-weight:600;text-transform:uppercase;
  letter-spacing:.5px;padding:3px 8px;border-radius:6px;margin-bottom:10px}
.steps-list{padding:4px 20px 24px;display:flex;flex-direction:column}
.step-item{display:flex;gap:14px;padding:0 0 24px;position:relative}
.step-item:last-child{padding-bottom:4px}
.step-left{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:32px}
.step-num{width:32px;height:32px;border-radius:50%;color:#fff;font-size:14px;
  font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-line{width:2px;flex:1;background:var(--divider);margin-top:6px;min-height:16px}
.step-item:last-child .step-line{display:none}
.step-body{flex:1;padding-top:4px}
.step-title{font-size:16px;font-weight:600;letter-spacing:-.2px;color:var(--text-primary);margin-bottom:5px}
.step-content{font-size:14px;color:var(--text-secondary);line-height:1.65}
.step-tip{margin-top:10px;background:var(--accent-light);border-radius:var(--radius-sm);
  padding:10px 12px;display:flex;align-items:flex-start;gap:7px}
.step-tip-icon{font-size:13px;flex-shrink:0;margin-top:1px}
.step-tip-text{font-size:13px;color:var(--accent);font-style:italic;line-height:1.5}

/* ── Empty ── */
.empty-state{text-align:center;padding:60px 40px}
.empty-icon{font-size:50px;margin-bottom:14px}
.empty-title{font-size:20px;font-weight:600;color:var(--text-primary);margin-bottom:8px}
.empty-text{font-size:15px;color:var(--text-secondary);line-height:1.5}

/* ── Misc ── */
.divider{height:1px;background:var(--divider);margin:0 20px}
mark{background:rgba(255,204,0,.32);color:inherit;border-radius:2px;padding:0 1px}

/* ── Offline ── */
.offline-banner{display:none;background:#ff9500;color:#fff;text-align:center;
  font-size:13px;font-weight:500;padding:8px 20px;position:fixed;
  top:calc(var(--nav-height) + var(--safe-top));left:0;right:0;z-index:99}
body.is-offline .offline-banner{display:block}
body.is-offline .main{padding-top:calc(var(--nav-height) + var(--safe-top) + 36px)}

@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>

<div class="offline-banner">✈️ Офлайн-режим — все данные доступны</div>

<header class="topbar">

/* ════════════════════════════════════════════════
   APP LOGIC
════════════════════════════════════════════════ */
let activeCat = 'all';
let searchQuery = '';
let favorites = new Set(JSON.parse(localStorage.getItem('favs') || '[]'));
let isDark = localStorage.getItem('theme') === 'dark' ||
  (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);

/* — Theme — */
function applyTheme(){
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('theme-btn').textContent = isDark ? '☀️' : '🌙';
}
document.getElementById('theme-btn').addEventListener('click', ()=>{
  isDark = !isDark;
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  applyTheme();
});
applyTheme();

/* — Navigation — */
function showPage(pageId){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.page === pageId));
  window.scrollTo(0,0);
  if(pageId === 'page-favorites') renderFavorites();
}
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => { if(btn.dataset.page) showPage(btn.dataset.page); });
});

/* — Pills (wrapped) — */
function buildPills(){
  const container = document.getElementById('cat-pills');
  PHRASES_DATA.categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-pill';
    btn.dataset.cat = cat.id;
    btn.textContent = cat.icon + ' ' + cat.title;
    btn.addEventListener('click', () => {
      activeCat = cat.id;
      document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      renderPhrases();
    });
    container.appendChild(btn);
  });
  container.querySelector('[data-cat="all"]').addEventListener('click', () => {
    activeCat = 'all';
    document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
    container.querySelector('[data-cat="all"]').classList.add('active');
    renderPhrases();
  });
}

/* — Helpers — */
function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function highlight(t, q){
  if(!q) return esc(t);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')','gi');
  return esc(t).replace(re,'<mark>$1</mark>');
}

/* — Render phrases — */
function renderPhrases(){
  const container = document.getElementById('phrases-list');
  container.innerHTML = '';
  const q = searchQuery.toLowerCase();
  const cats = activeCat === 'all'
    ? PHRASES_DATA.categories
    : PHRASES_DATA.categories.filter(c => c.id === activeCat);
  let total = 0;

  cats.forEach(cat => {
    const filtered = cat.phrases.filter(p =>
      !q || p.en.toLowerCase().includes(q) || p.ru.toLowerCase().includes(q)
    );
    if(!filtered.length) return;
    total += filtered.length;

    if(activeCat === 'all'){
      const gt = document.createElement('div');
      gt.className = 'phrase-group-title';
      gt.textContent = cat.icon + ' ' + cat.title;
      container.appendChild(gt);
    }

    filtered.forEach((phrase, i) => {
      const key = cat.id + '_' + i;
      const isFav = favorites.has(key);
      const card = document.createElement('div');
      card.className = 'phrase-card';
      card.innerHTML = `
        <div class="phrase-en">${highlight(phrase.en, searchQuery)}</div>
        <div class="phrase-ru">${highlight(phrase.ru, searchQuery)}</div>
        <button class="star-btn${isFav ? ' active' : ''}" data-key="${key}" aria-label="Избранное">★</button>
      `;
      card.querySelector('.star-btn').addEventListener('click', e => {
        e.stopPropagation();
        toggleFav(key, e.currentTarget);
      });
      card.addEventListener('click', () => copyPhrase(phrase.en));
      container.appendChild(card);
    });
  });

  if(total === 0){
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">Ничего не найдено</div><div class="empty-text">Попробуйте другой запрос</div></div>`;
  }
}

/* — Favorites — */
function toggleFav(key, btn){
  if(favorites.has(key)){
    favorites.delete(key);
    btn.classList.remove('active');
  } else {
    favorites.add(key);
    btn.classList.add('active');
    btn.style.transform = 'translateY(-50%) scale(1.5)';
    setTimeout(() => btn.style.transform = '', 250);
  }
  localStorage.setItem('favs', JSON.stringify([...favorites]));
}

function renderFavorites(){
  const container = document.getElementById('favorites-list');
  container.innerHTML = '';
  if(favorites.size === 0){
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">⭐</div><div class="empty-title">Нет избранных фраз</div><div class="empty-text">Нажмите ★ у фразы, чтобы добавить её сюда</div></div>`;
    return;
  }
  favorites.forEach(key => {
    const [catId, idxStr] = key.split('_');
    const cat = PHRASES_DATA.categories.find(c => c.id === catId);
    if(!cat || !cat.phrases[+idxStr]) return;
    const phrase = cat.phrases[+idxStr];
    const card = document.createElement('div');
    card.className = 'phrase-card';
    card.innerHTML = `
      <div class="phrase-en">${esc(phrase.en)}</div>
      <div class="phrase-ru">${esc(phrase.ru)}</div>
      <button class="star-btn active" data-key="${key}" aria-label="Удалить из избранного">★</button>
    `;
    card.querySelector('.star-btn').addEventListener('click', e => {
      e.stopPropagation();
      toggleFav(key, e.currentTarget);
      setTimeout(() => renderFavorites(), 280);
    });
    card.addEventListener('click', () => copyPhrase(phrase.en));
    container.appendChild(card);
  });
}

/* — Copy — */
function copyPhrase(text){
  navigator.clipboard?.writeText(text).catch(()=>{});
  const t = document.getElementById('copy-toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

/* — Search — */
document.getElementById('phrase-search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  document.getElementById('search-clear').style.display = searchQuery ? 'block' : 'none';
  renderPhrases();
});
document.getElementById('search-clear').addEventListener('click', () => {
  document.getElementById('phrase-search').value = '';
  searchQuery = '';
  document.getElementById('search-clear').style.display = 'none';
  renderPhrases();
});

/* — Guides — */
function renderGuides(){
  const container = document.getElementById('guides-list');
  GUIDES_DATA.guides.forEach(guide => {
    const card = document.createElement('div');
    card.className = 'guide-card';
    card.innerHTML = `
      <div class="guide-card-icon" style="background:${guide.color}1a">${guide.icon}</div>
      <div class="guide-card-body">
        <div class="guide-card-title">${esc(guide.title)}</div>
        <div class="guide-card-sub">${esc(guide.subtitle)}</div>
        <div class="guide-card-count">${guide.steps.length} шагов</div>
      </div>
      <span class="guide-chevron">›</span>
    `;
    card.addEventListener('click', () => openGuide(guide));
    container.appendChild(card);
  });
}

function openGuide(guide){
  const content = document.getElementById('guide-detail-content');
  content.innerHTML = `
    <div class="guide-hero">
      <div class="guide-hero-icon" style="background:${guide.color}1a">${guide.icon}</div>
      <div class="tag" style="background:${guide.color}1a;color:${guide.color}">${esc(guide.subtitle)}</div>
      <div class="guide-hero-title">${esc(guide.title)}</div>
    </div>
    <div class="divider"></div>
    <div class="steps-list" id="steps-content"></div>
  `;
  const stepsEl = content.querySelector('#steps-content');
  guide.steps.forEach((step, i) => {
    const s = document.createElement('div');
    s.className = 'step-item';
    s.innerHTML = `
      <div class="step-left">
        <div class="step-num" style="background:${guide.color}">${i+1}</div>
        <div class="step-line"></div>
      </div>
      <div class="step-body">
        <div class="step-title">${esc(step.title)}</div>
        <div class="step-content">${esc(step.content)}</div>
        ${step.tip ? `<div class="step-tip"><span class="step-tip-icon">💡</span><span class="step-tip-text">${esc(step.tip)}</span></div>` : ''}
      </div>
    `;
    stepsEl.appendChild(s);
  });
  showPage('page-guide-detail');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-page="page-guides"]').classList.add('active');
}

document.getElementById('guide-back-btn').addEventListener('click', () => showPage('page-guides'));

/* — Offline — */
function checkOnline(){ document.body.classList.toggle('is-offline', !navigator.onLine); }
window.addEventListener('online', checkOnline);
window.addEventListener('offline', checkOnline);
checkOnline();

/* — Service Worker — */
/* — Inline Service Worker via Blob — */
if ('serviceWorker' in navigator) {
  const swCode = `
const CACHE = 'tg-v3';
// We cache a special key that holds the full HTML
const HTML_KEY = 'travel-guide-html';

self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(cache => {
      // Cache the SW itself and the page key
      return cache.put(HTML_KEY, new Response('cached', {headers:{'Content-Type':'text/plain'}}));
    })
  );
  self.skipWaiting();
});

self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
    )
  );
  self.clients.claim();
});

self.addEventListener('fetch', e => {
  // For navigation requests, try network first, fall back to cache
  if (e.request.mode === 'navigate') {
    e.respondWith(
      fetch(e.request)
        .then(resp => {
          // Clone and store in cache
          const clone = resp.clone();
          caches.open(CACHE).then(cache => cache.put(e.request, clone));
          return resp;
        })
        .catch(() => caches.match(e.request).then(r => r || caches.match('/')))
    );
    return;
  }
  // For other requests: cache first
  e.respondWith(
    caches.match(e.request).then(cached => cached || fetch(e.request).then(resp => {
      const clone = resp.clone();
      caches.open(CACHE).then(cache => cache.put(e.request, clone));
      return resp;
    }).catch(() => new Response('', {status: 408})))
  );
});
`;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, {scope: './'})
    .then(reg => {
      console.log('[SW] Registered via blob, scope:', reg.scope);
      // Also try to cache current page immediately
      if (reg.active) {
        caches.open('tg-v3').then(cache => cache.put(location.href, new Response(document.documentElement.outerHTML, {headers: {'Content-Type': 'text/html'}})));
      }
    })
    .catch(err => console.warn('[SW] Blob registration failed:', err));
}

/* — Cache page HTML on load for true offline — */
window.addEventListener('load', () => {
  if (!('caches' in window)) return;
  // Serialize the full page into Cache API so it survives offline
  const htmlContent = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  const resp = new Response(htmlContent, {
    headers: { 'Content-Type': 'text/html; charset=utf-8' }
  });
  caches.open('tg-v3').then(cache => {
    cache.put(location.href, resp.clone());
    cache.put('./', resp.clone());
    cache.put('./index.html', resp);
    console.log('[Cache] Page cached for offline use at', location.href);
  });
});

/* — Init — */
buildPills();
renderPhrases();
renderGuides();
</script>
